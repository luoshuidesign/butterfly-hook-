<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=1200,initial-scale=1"><title>Hook Cover</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#000}
.c{width:1200px;height:630px;position:relative;overflow:hidden;background:linear-gradient(180deg,#0d0d28 0%,#0a0a20 32%,#020818 36%,#010510 100%);font-family:system-ui,-apple-system,sans-serif}

/* 钓竿 */
.rod{position:absolute;top:30px;left:170px;width:5px;height:230px;background:linear-gradient(180deg,#e0c898,#b08040,#5a2a08);border-radius:3px;transform:rotate(16deg);transform-origin:top center;box-shadow:0 0 20px rgba(200,160,100,.4);z-index:5}
.rod-tip{position:absolute;top:248px;left:235px;width:10px;height:10px;background:#d4b878;border-radius:50%;box-shadow:0 0 25px rgba(200,160,100,.6);z-index:5}
.line{position:absolute;top:254px;left:239px;width:1.5px;height:110px;background:rgba(255,255,255,.35);z-index:5}
.hook{position:absolute;top:358px;left:231px;width:18px;height:32px;border:2px solid rgba(120,240,255,.8);border-radius:0 0 9px 9px;border-top:none;z-index:5;box-shadow:0 0 30px rgba(100,200,255,.6),0 0 60px rgba(100,200,255,.3)}
.hook::after{content:'';position:absolute;top:-12px;right:7px;width:2px;height:16px;background:rgba(120,240,255,.6)}
.glow{position:absolute;top:375px;left:218px;width:45px;height:45px;background:radial-gradient(circle,rgba(120,240,255,.5) 0%,rgba(100,180,255,.2) 50%,transparent 70%);z-index:4}

/* 深水背景 */
.deep{position:absolute;top:36%;left:0;width:100%;height:64%;background:linear-gradient(180deg,rgba(0,10,30,.85) 0%,rgba(0,5,20,.97) 40%,rgba(0,2,8,1) 100%)}

/* 标题 */
.title{position:absolute;top:45px;left:370px;color:#fff;font-size:62px;font-weight:800;letter-spacing:-2px;z-index:10}
.title-sub{position:absolute;top:118px;left:375px;color:rgba(255,255,255,.38);font-size:18px;font-weight:400;letter-spacing:2px;z-index:10}

/* 浮动标签容器 */
.tags{position:absolute;bottom:55px;left:0;width:100%;display:flex;flex-wrap:wrap;gap:16px;justify-content:center;padding:0 80px;z-index:10}
.tag{padding:14px 24px;border-radius:12px;font-size:16px;font-weight:600;backdrop-filter:blur(10px);transition:transform .6s}
.tag:nth-child(1){background:rgba(120,100,255,.1);border:1.5px solid rgba(120,100,255,.28);color:#d8d0ff}
.tag:nth-child(2){background:rgba(60,200,180,.1);border:1.5px solid rgba(60,200,180,.28);color:#b8f4ec}
.tag:nth-child(3){background:rgba(255,170,60,.1);border:1.5px solid rgba(255,170,60,.28);color:#ffe4b8}
.tag:nth-child(4){background:rgba(180,100,255,.1);border:1.5px solid rgba(180,100,255,.28);color:#e4ccff}
.tag:nth-child(5){background:rgba(80,180,255,.1);border:1.5px solid rgba(80,180,255,.28);color:#bce0ff}
.tag:nth-child(6){background:rgba(255,120,140,.1);border:1.5px solid rgba(255,120,140,.28);color:#ffccd4}
.tag:nth-child(7){background:rgba(100,255,160,.1);border:1.5px solid rgba(100,255,160,.28);color:#c4ffdc}
.tag:nth-child(8){background:rgba(255,200,80,.1);border:1.5px solid rgba(255,200,80,.28);color:#ffeca0}

canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#particles{z-index:3}#waves{z-index:2}
</style></head><body>
<div class="c">
<canvas id="particles"></canvas>
<canvas id="waves"></canvas>
<div class="rod"></div><div class="rod-tip"></div><div class="line"></div><div class="hook"></div><div class="glow"></div>
<div class="deep"></div>
<div class="title">🪝 Hook</div>
<div class="title-sub">数字海洋的钓竿 · 钩住万物·化为智慧·创造新生</div>
<div class="tags" id="tags">
<span class="tag">🧠 智慧代码</span><span class="tag">💡 创意变量</span><span class="tag">💰 商业设计</span><span class="tag">🎨 配色哲学</span>
<span class="tag">🔤 字体系统</span><span class="tag">✨ 动效规律</span><span class="tag">🧬 自进化</span><span class="tag">🌍 Everything</span>
</div>
</div>
<script>
// 背景粒子
(function(){const c=document.getElementById('particles'),ctx=c.getContext('2d');c.width=1200;c.height=630;const P=[];for(let i=0;i<120;i++){const y=Math.random()*630;P.push({x:Math.random()*1200,y,r:.3+Math.random()*1.5,vx:(Math.random()-.5)*.2,vy:y>250?.1+Math.random()*.4:(Math.random()-.5)*.1,a:y>250?.03+Math.random()*.08:.01+Math.random()*.02,c:y>250?Math.random()>.5?'100,180,240':'120,100,255':'200,200,230'})}
(function D(){ctx.clearRect(0,0,1200,630);P.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=1200;if(p.x>1200)p.x=0;if(p.y>630)p.y=250;if(p.y<0)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba('+p.c+','+p.a+')';ctx.fill()});requestAnimationFrame(D)})()})();

// 波浪水面
(function(){const c=document.getElementById('waves'),ctx=c.getContext('2d');c.width=1200;c.height=630;let t=0;
(function D(){t+=.02;ctx.clearRect(0,0,1200,630);
// 主波浪
ctx.beginPath();ctx.moveTo(0,230);
for(let x=0;x<=1200;x+=3){const y=225+Math.sin(x*.008+t)*8+Math.sin(x*.015+t*1.3)*6+Math.sin(x*.003+t*.7)*12}ctx.lineTo(1200,230);
for(let x=0;x<=1200;x+=3){const y=225+Math.sin(x*.008+t)*8+Math.sin(x*.015+t*1.3)*6+Math.sin(x*.003+t*.7)*12;ctx.lineTo(x,y)}ctx.lineTo(0,230);ctx.closePath();
const g=ctx.createLinearGradient(0,200,0,260);g.addColorStop(0,'rgba(80,180,220,.25)');g.addColorStop(.3,'rgba(100,200,240,.15)');g.addColorStop(.6,'rgba(120,100,255,.08)');g.addColorStop(1,'rgba(120,100,255,0)');ctx.fillStyle=g;ctx.fill();
// 光晕线
ctx.beginPath();
for(let x=0;x<=1200;x+=3){const y=225+Math.sin(x*.008+t)*8+Math.sin(x*.015+t*1.3)*6+Math.sin(x*.003+t*.7)*12;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.strokeStyle='rgba(120,200,240,.5)';ctx.lineWidth=2;ctx.stroke();
ctx.strokeStyle='rgba(120,100,255,.25)';ctx.lineWidth=6;ctx.stroke();
requestAnimationFrame(D)})()})();

// 浮动标签
(function(){const tags=document.querySelectorAll('.tag');let frame=0;(function A(){frame+=.015;tags.forEach((t,i)=>{const y=Math.sin(frame+i*.8)*6+(Math.cos(frame*.7+i*.5)*4);t.style.transform='translateY('+y+'px)'});requestAnimationFrame(A)})()})();
</script>
</body></html>

<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=1200,initial-scale=1"><title>蝴蝶钩</title>
<style>
*{margin:0;padding:0}body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh}
.c{width:1200px;height:630px;position:relative;overflow:hidden;background:linear-gradient(180deg,#020818 0%,#010a20 25%,#000d28 38%,#000510 100%)}

/* 水下光柱 */
.light-rays{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.ray{position:absolute;top:-100px;background:linear-gradient(180deg,rgba(100,180,230,.06) 0%,rgba(80,160,220,.03) 40%,transparent 100%);transform-origin:top center}

/* Logo */
.brand{position:absolute;top:48px;left:72px;display:flex;align-items:center;gap:16px;z-index:10}
.logo-icon{position:relative;width:44px;height:44px}
.brand-text{display:flex;flex-direction:column}
.brand-name{color:#fff;font-size:32px;font-weight:600;letter-spacing:-.5px;line-height:1}
.brand-sub{color:rgba(180,210,240,.4);font-size:11px;font-weight:400;letter-spacing:3px;margin-top:2px}

.tagline{position:absolute;top:136px;left:76px;color:rgba(180,210,240,.25);font-size:14px;font-weight:400;letter-spacing:4px;z-index:10}

/* 水下发光文字 */
.words{position:absolute;bottom:50px;left:40px;right:40px;display:flex;flex-wrap:wrap;gap:24px;justify-content:center;z-index:8}
.words span{font-size:15px;font-weight:400;letter-spacing:1px;text-shadow:0 0 20px rgba(140,200,240,.4),0 0 40px rgba(100,160,220,.2)}

/* 水面线 */
.surface-line{position:absolute;top:35%;left:0;width:100%;height:80px;background:linear-gradient(180deg,transparent,rgba(100,180,220,.04) 40%,rgba(80,160,220,.06) 60%,transparent);pointer-events:none}

canvas{position:absolute;top:0;left:0;width:100%;height:100%}
</style></head><body>
<div class="c">
<canvas id="c"></canvas>

<!-- 水下光柱 -->
<div class="light-rays" id="rays"></div>

<div class="surface-line"></div>

<!-- Logo -->
<div class="brand">
  <svg class="logo-icon" width="44" height="44" viewBox="0 0 44 44">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#c8e0ff"/>
        <stop offset="40%" stop-color="#80b8f0"/>
        <stop offset="100%" stop-color="#4880d0"/>
      </linearGradient>
      <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <!-- 蝴蝶左翼 -->
    <path d="M22 8 Q8 16 12 30 Q16 36 22 24" fill="none" stroke="url(#g)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
    <!-- 蝴蝶右翼 -->
    <path d="M22 8 Q36 16 32 30 Q28 36 22 24" fill="none" stroke="url(#g)" stroke-width="2" stroke-linecap="round" filter="url(#glow)"/>
    <!-- 身体/钩身 -->
    <line x1="22" y1="22" x2="22" y2="38" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
    <!-- 钩弯 -->
    <path d="M22 38 Q22 44 17 41" fill="none" stroke="url(#g)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
    <!-- 钩尖 -->
    <line x1="17" y1="41" x2="20" y2="37" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
    <!-- 光点 -->
    <circle cx="19" cy="40" r="2" fill="rgba(180,220,255,.9)" filter="url(#glow)"/>
  </svg>
  <div class="brand-text">
    <span class="brand-name">蝴蝶钩</span>
    <span class="brand-sub">BUTTERFLY HOOK</span>
  </div>
</div>

<div class="tagline">HOOK · TRANSFORM · CREATE · EVOLVE</div>

<div class="words" id="words"></div>
</div>

<script>
// 光柱
(function(){const r=document.getElementById('rays');for(let i=0;i<5;i++){const d=document.createElement('div');d.className='ray';d.style.left=(15+i*18)+'%';d.style.width=(4+Math.random()*8)+'%';d.style.height=(40+Math.random()*60)+'%';d.style.transform='rotate('+(-5+Math.random()*10)+'deg)';d.style.opacity=.3+Math.random()*.5;r.appendChild(d)}})();

const C=document.getElementById('c'),ctx=C.getContext('2d');C.width=1200;C.height=630;
let t=0;

const words=['Wisdom Code','Creative Variables','Business Design','Color Philosophy','Typography System','Motion Patterns','Self Evolution','Everything','Layout Geometry','CSS Variables','10-Layer Shield','Metamorphosis','30 Passages'];
const wc=document.getElementById('words');
words.forEach(w=>{const s=document.createElement('span');s.textContent=w;s.style.color='rgba(200,225,250,'+(.35+Math.random()*.25)+')';wc.appendChild(s)});

const fish=[];
document.querySelectorAll('.words span').forEach(el=>{
  fish.push({el,x:Math.random()*900+100,y:Math.random()*280+260,vx:(Math.random()-.5)*.15,vy:(Math.random()-.5)*.1,phase:Math.random()*Math.PI*2});
});

function draw(){
  t+=.012;ctx.clearRect(0,0,1200,630);
  const surfaceY=225+Math.sin(t)*4;

  // 波光粼粼 - 水面光点
  for(let i=0;i<30;i++){
    const sx=100+(i*37+t*20)%1100;
    const sy=surfaceY-5+Math.sin(i+t)*8;
    const sa=.15+Math.abs(Math.sin(i*2.3+t*1.7))*.2;
    ctx.beginPath();ctx.arc(sx,sy,1+Math.random()*2,0,Math.PI*2);
    ctx.fillStyle='rgba(180,220,255,'+sa+')';ctx.fill();
  }

  // 水底粒子
  for(let i=0;i<180;i++){
    const x=(i*71+t*6)%1200;
    const y=240+(i*47+t*4)%390;
    const a=.01+Math.abs(Math.sin(t+i*.3))*.04;
    ctx.beginPath();ctx.arc(x,y,.4,0,Math.PI*2);
    ctx.fillStyle='rgba(120,180,230,'+a+')';ctx.fill();
  }

  // 钓竿 - 左上优雅弧线
  const rx=160,rt=120,rb=250;
  ctx.beginPath();ctx.moveTo(rx-15,rt-50);ctx.lineTo(rx,rt);ctx.lineTo(rx+8,rb);
  const grd=ctx.createLinearGradient(rx-15,rt-50,rx+5,rb);
  grd.addColorStop(0,'rgba(200,160,100,.9)');grd.addColorStop(.4,'rgba(160,110,50,.8)');grd.addColorStop(1,'rgba(80,40,15,.7)');
  ctx.strokeStyle=grd;ctx.lineWidth=5;ctx.lineCap='round';ctx.stroke();

  // 鱼线 - 优雅曲线
  ctx.beginPath();ctx.moveTo(rx+8,rb);
  ctx.bezierCurveTo(rx+25,rb+40,rx+35,surfaceY+20,rx+50,surfaceY+40);
  ctx.strokeStyle='rgba(200,220,240,.15)';ctx.lineWidth=.8;ctx.stroke();

  // 水面波浪
  ctx.beginPath();
  for(let x=0;x<=1200;x+=2){
    const y=surfaceY+Math.sin(x*.002+t)*6+Math.sin(x*.006+t*1.4)*3+Math.sin(x*.012+t*1.9)*2;
    x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.strokeStyle='rgba(80,160,220,.35)';ctx.lineWidth=1.5;ctx.stroke();
  ctx.strokeStyle='rgba(80,160,220,.08)';ctx.lineWidth=12;ctx.stroke();

  // 精美鱼钩
  const hx=rx+50,hy=surfaceY+48;
  // 钩身
  ctx.beginPath();ctx.moveTo(hx,hy-28);ctx.lineTo(hx,hy+22);
  ctx.strokeStyle='rgba(190,225,250,.75)';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();
  // 钩弯
  ctx.beginPath();ctx.arc(hx-14,hy+22,15,0,Math.PI,false);
  ctx.strokeStyle='rgba(190,225,250,.75)';ctx.lineWidth=2.5;ctx.stroke();
  // 钩尖
  ctx.beginPath();ctx.moveTo(hx-29,hy+22);ctx.lineTo(hx-24,hy+8);
  ctx.strokeStyle='rgba(220,240,255,.85)';ctx.lineWidth=1.5;ctx.stroke();
  // 光晕
  const gl=ctx.createRadialGradient(hx-10,hy+10,1,hx-10,hy+10,45);
  gl.addColorStop(0,'rgba(160,210,250,.3)');gl.addColorStop(1,'rgba(100,160,220,0)');
  ctx.fillStyle=gl;ctx.fillRect(hx-50,hy-30,90,90);

  // 移动发光文字
  fish.forEach(f=>{
    f.x+=f.vx;f.y+=f.vy;
    if(f.x<30)f.x=1170;if(f.x>1170)f.x=30;
    if(f.y<250)f.y=250;if(f.y>580)f.y=580;
    f.el.style.transform='translate('+(f.x-500)+'px,'+(f.y-420)+'px)';
    const glow=.2+Math.sin(t+f.phase)*.12;
    f.el.style.textShadow='0 0 '+(20+glow*30)+'px rgba(160,210,240,'+(.3+glow)+'),0 0 '+(40+glow*50)+'px rgba(100,160,220,'+(.15+glow*.5)+')';
  });

  requestAnimationFrame(draw);
}
draw();
</script>
</body></html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=1200,initial-scale=1">
<title>Hook Cover</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh}
.cover{width:1200px;height:630px;position:relative;overflow:hidden;background:linear-gradient(180deg,#0a0a1a 0%,#0d0d2b 40%,#020210 100%)}
.sky{position:absolute;top:0;left:0;width:100%;height:45%;background:radial-gradient(ellipse at 50% 80%,rgba(124,92,252,.08) 0%,transparent 70%)}
.ocean{position:absolute;bottom:0;left:0;width:100%;height:55%;background:linear-gradient(180deg,rgba(0,20,60,.9) 0%,rgba(0,10,40,.95) 30%,rgba(0,5,20,.98) 100%)}
.surface{position:absolute;top:45%;left:0;width:100%;height:3px;background:linear-gradient(90deg,transparent,rgba(124,92,252,.4),rgba(78,201,176,.3),rgba(124,92,252,.4),transparent);box-shadow:0 0 30px rgba(124,92,252,.2),0 0 60px rgba(124,92,252,.1)}
.rod{position:absolute;top:80px;right:150px;width:4px;height:280px;background:linear-gradient(180deg,#c8a87c,#8b6914,#5c3d0e);border-radius:2px;transform:rotate(-25deg);transform-origin:bottom center;box-shadow:0 0 10px rgba(200,168,124,.3)}
.line{position:absolute;top:340px;right:245px;width:1.5px;height:180px;background:rgba(255,255,255,.4);transform:rotate(-5deg)}
.hook{position:absolute;top:510px;right:238px;width:18px;height:30px;border:2px solid rgba(255,255,255,.6);border-radius:0 0 9px 9px;border-top:none;box-shadow:0 0 20px rgba(124,92,252,.5),0 0 40px rgba(124,92,252,.3)}
.hook::after{content:'';position:absolute;top:-8px;right:7px;width:2px;height:14px;background:rgba(255,255,255,.4)}
.items{position:absolute;bottom:40px;left:40px;right:40px;display:flex;flex-wrap:wrap;gap:16px;justify-content:center;opacity:.9}
.item{background:rgba(124,92,252,.08);border:1px solid rgba(124,92,252,.2);border-radius:16px;padding:14px 24px;color:rgba(255,255,255,.85);font-family:system-ui,sans-serif;font-size:15px;font-weight:500;backdrop-filter:blur(10px);transition:all .3s}
.item:hover{background:rgba(124,92,252,.2);border-color:rgba(124,92,252,.5);transform:translateY(-2px)}
.title{position:absolute;top:30px;left:60px;color:#fff;font-family:system-ui,sans-serif;font-size:42px;font-weight:700;letter-spacing:-1px;text-shadow:0 0 40px rgba(124,92,252,.3)}
.subtitle{position:absolute;top:85px;left:60px;color:rgba(255,255,255,.5);font-size:18px;font-family:system-ui,sans-serif}
.particles{position:absolute;top:45%;left:0;width:100%;height:55%}
.canvas-bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
</style>
</head>
<body>
<div class="cover" id="cover">
  <canvas class="canvas-bg" id="bg"></canvas>
  <div class="sky"></div>
  <div class="ocean"></div>
  <div class="surface"></div>
  <div class="rod"></div>
  <div class="line"></div>
  <div class="hook"></div>
  <canvas class="particles" id="particles"></canvas>
  <div class="title">🪝 Hook</div>
  <div class="subtitle">数字海洋的钓竿 · 钩住万物·化为智慧·创造新生</div>
  <div class="items">
    <span class="item">🧠 智慧代码</span>
    <span class="item">💡 创意变量</span>
    <span class="item">💰 商业设计</span>
    <span class="item">🎨 配色哲学</span>
    <span class="item">🔤 字体系统</span>
    <span class="item">✨ 动效规律</span>
    <span class="item">🧬 自进化</span>
    <span class="item">🌍 Everything</span>
  </div>
</div>
<script>
(function(){const c=document.getElementById('bg');if(!c)return;const ctx=c.getContext('2d');c.width=1200;c.height=630;let t=0;function draw(){t+=.005;ctx.clearRect(0,0,c.width,c.height);for(let i=0;i<60;i++){const x=200+Math.sin(t+i*.3)*180+Math.cos(i*1.7)*120;const y=300+Math.cos(t+i*.4)*120+Math.sin(i*.9)*60;ctx.beginPath();ctx.arc(x,y,1+Math.random()*1.5,0,Math.PI*2);ctx.fillStyle='rgba(124,92,252,'+(.05+Math.random()*.08)+')';ctx.fill()}for(let i=0;i<50;i++){const x=100+Math.random()*1000;const y=350+Math.random()*250;ctx.beginPath();ctx.arc(x,y,.5+Math.random()*1,0,Math.PI*2);ctx.fillStyle='rgba(78,201,176,'+(.03+Math.random()*.06)+')';ctx.fill()}requestAnimationFrame(draw)}draw()})();
(function(){const c=document.getElementById('particles');if(!c)return;const ctx=c.getContext('2d');c.width=1200;c.height=350;const pts=[];for(let i=0;i<40;i++)pts.push({x:200+Math.random()*800,y:Math.random()*350,r:1+Math.random()*2,vx:(Math.random()-.5)*.4,vy:.3+Math.random()*.5});function draw(){ctx.clearRect(0,0,c.width,c.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;if(p.y>c.height)p.y=0;if(p.y<0)p.y=c.height;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(124,92,252,'+(.1+Math.random()*.15)+')';ctx.fill()});for(let i=0;i<pts.length;i++){for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y;const d=Math.sqrt(dx*dx+dy*dy);if(d<80){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle='rgba(78,201,176,'+(.06*(1-d/80))+')';ctx.stroke()}}}requestAnimationFrame(draw)}draw()})();
</script>
</body>
</html>
